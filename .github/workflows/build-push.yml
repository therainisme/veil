name: Build and Push

on:
  push:
    tags:
      - '*'
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

concurrency:
  group: build-push-tag
  cancel-in-progress: true

jobs:
  build-push-amd64:
    runs-on: ubuntu-latest

    steps:
      - name: Lowercase owner
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Set image repository
        run: echo "IMAGE_REPO=ghcr.io/${OWNER}/veil-box" >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push amd64 image
        uses: docker/build-push-action@v6
        with:
          context: ./veil-box
          platforms: linux/amd64
          push: true
          provenance: false
          tags: |
            ${{ env.IMAGE_REPO }}:latest
            ${{ env.IMAGE_REPO }}:${{ github.sha }}

      - name: Add tag alias
        if: github.ref_type == 'tag'
        run: docker buildx imagetools create -t "${IMAGE_REPO}:${GITHUB_REF_NAME}" "${IMAGE_REPO}:${GITHUB_SHA}"
