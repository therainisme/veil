name: Build and Push

on:
  push:
    tags:
      - '*'
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

concurrency:
  group: build-push-images
  cancel-in-progress: true

jobs:
  build-push-amd64:
    runs-on: ubuntu-latest

    steps:
      - name: Lowercase owner
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Set image repositories
        run: |
          echo "BOX_IMAGE_REPO=ghcr.io/${OWNER}/veil-box" >> "$GITHUB_ENV"
          echo "RUNNER_IMAGE_REPO=ghcr.io/${OWNER}/veil-actions-runner" >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push veil-box amd64 image
        uses: docker/build-push-action@v6
        with:
          context: ./veil-box
          platforms: linux/amd64
          push: true
          provenance: false
          tags: |
            ${{ env.BOX_IMAGE_REPO }}:latest
            ${{ env.BOX_IMAGE_REPO }}:${{ github.sha }}

      - name: Build and push veil-actions-runner amd64 image
        uses: docker/build-push-action@v6
        with:
          context: ./veil-actions-runner
          platforms: linux/amd64
          push: true
          provenance: false
          build-args: |
            BASE_IMAGE=${{ env.BOX_IMAGE_REPO }}:${{ github.sha }}
          tags: |
            ${{ env.RUNNER_IMAGE_REPO }}:latest
            ${{ env.RUNNER_IMAGE_REPO }}:${{ github.sha }}

      - name: Add veil-box tag alias
        if: github.ref_type == 'tag'
        run: docker buildx imagetools create -t "${BOX_IMAGE_REPO}:${GITHUB_REF_NAME}" "${BOX_IMAGE_REPO}:${GITHUB_SHA}"

      - name: Add veil-actions-runner tag alias
        if: github.ref_type == 'tag'
        run: docker buildx imagetools create -t "${RUNNER_IMAGE_REPO}:${GITHUB_REF_NAME}" "${RUNNER_IMAGE_REPO}:${GITHUB_SHA}"
